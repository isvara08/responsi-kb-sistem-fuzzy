    <style>
        .squishy-shadow {
            box-shadow: 0 6px 0 0 rgba(0,0,0,0.1);
        }
        .squishy-shadow:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 rgba(0,0,0,0.1);
        }
        .squishy-shadow-blue {
            box-shadow: 0 6px 0 0 rgba(43, 182, 255, 0.2);
        }
        
        .squishy-shadow-blue:active {
             transform: translateY(4px);
             box-shadow: 0 2px 0 0 rgba(43, 182, 255, 0.2);
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -12px; 
            box-shadow: 0 4px 0 0 rgba(0,0,0,0.15);
            border: 4px solid currentColor;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 6px 0 0 rgba(0,0,0,0.2);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            transition: background 0.3s ease;
        }

        input[type=range]:hover::-webkit-slider-runnable-track {
            background: rgba(0,0,0,0.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            10%, 30%, 50%, 70%, 90% {
                transform: translateX(-5px);
            }
            20%, 40%, 60%, 80% {
                transform: translateX(5px);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .animate-slide-left {
            animation: slideInLeft 0.8s ease-out forwards;
        }

        .animate-slide-right {
            animation: slideInRight 0.8s ease-out forwards;
        }

        .animate-scale-in {
            animation: scaleIn 0.6s ease-out forwards;
        }

        .animate-pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }

        .animate-rotate {
            animation: rotate 20s linear infinite;
        }

        .delay-100 {
            animation-delay: 0.1s;
        }

        .delay-200 {
            animation-delay: 0.2s;
        }

        .delay-300 {
            animation-delay: 0.3s;
        }

        .delay-400 {
            animation-delay: 0.4s;
        }

        .delay-500 {
            animation-delay: 0.5s;
        }

        .hover-lift {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 0 0 rgba(43, 182, 255, 0.3);
        }

        .value-pop {
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .value-pop.changed {
            transform: scale(1.3);
        }

<script>
    function updateHeartRate(val) {
        const display = document.getElementById('hr-display');
        display.textContent = val;
        display.classList.add('changed');
        setTimeout(() => display.classList.remove('changed'), 200);
    }
    function updateTemperature(val) {
        const display = document.getElementById('temp-display');
        display.textContent = val;
        display.classList.add('changed');
        setTimeout(() => display.classList.remove('changed'), 200);
    }
    function updateDuration(val) {
        const display = document.getElementById('dur-display');
        display.textContent = val;
        display.classList.add('changed');
        setTimeout(() => display.classList.remove('changed'), 200);
    }
</script>
<!-- Audio Control -->
<audio id="bgAudio" loop>

</audio>
<button id="audioToggle" class="fixed bottom-4 right-4 z-50 bg-white/90 backdrop-blur-sm rounded-full p-3 shadow-lg border-2 border-primary hover-lift transition-all squish-click" title="Toggle Audio">
<span class="material-symbols-outlined text-2xl text-primary" id="audioIcon">volume_off</span>
</button>
<script>
const audio = document.getElementById('bgAudio');
const audioToggle = document.getElementById('audioToggle');
const audioIcon = document.getElementById('audioIcon');

// Check localStorage for audio state
const audioState = localStorage.getItem('audioState');
if (audioState === 'playing') {
audio.play().catch(e => console.log('Autoplay prevented'));
audioIcon.textContent = 'volume_up';
}

audioToggle.addEventListener('click', () => {
if (audio.paused) {
audio.play();
audioIcon.textContent = 'volume_up';
localStorage.setItem('audioState', 'playing');
} else {
audio.pause();
audioIcon.textContent = 'volume_off';
localStorage.setItem('audioState', 'paused');
}
});
</script>
